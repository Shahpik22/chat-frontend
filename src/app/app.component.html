<!-- src/app/app.component.html -->

<div class="app-container">

  <!-- LOGIN SCREEN -->
  <div class="login-card" *ngIf="!joined">

    <div class="logo">
      💬
    </div>

    <h1>Chat App</h1>

    <p class="subtitle">
      Join the conversation
    </p>

    <input
      type="text"
      placeholder="Enter your name"
      [(ngModel)]="name"
      (keyup.enter)="joinChat()"
    />

    <button (click)="joinChat()">
      Join Chat
    </button>

  </div>

  <!-- CHAT SCREEN -->
  <div class="chat-container" *ngIf="joined">

    <!-- HEADER -->
    <div class="chat-header">

      <div class="profile">
        <div class="avatar">
          {{ name.charAt(0).toUpperCase() }}
        </div>

        <div>
          <div class="username">
            {{ name }}
          </div>

          <div class="status">
            Online
          </div>
        </div>
      </div>

    </div>

    <!-- MESSAGES -->
    <div class="messages" #scrollMe>

      <div
        *ngFor="let msg of messages"
        class="message-wrapper"
        [class.me-wrapper]="msg.name === name"
      >

        <div
          class="message"
          [class.me]="msg.name === name"
          [class.other]="msg.name !== name"
        >

          <div
            class="sender"
            *ngIf="msg.name !== name"
          >
            {{ msg.name }}
          </div>

          <div class="text">
            {{ msg.message }}
          </div>

        </div>

      </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">

      <input
        type="text"
        placeholder="Type a message"
        [(ngModel)]="message"
        (keyup.enter)="sendMessage()"
      />

      <button (click)="sendMessage()">
        ➤
      </button>

    </div>

  </div>

</div>
