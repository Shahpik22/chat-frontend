<div class="app-container">
  <!-- IN-TAB NOTIFICATION -->
  <div class="inapp-notif" *ngIf="showInAppNotif">
    {{ notifText }}
  </div>

  <!-- LOGIN -->
  <div class="login-card" *ngIf="!joined && !roomId">

    <div class="logo">💬</div>

    <h1>Chat App</h1>

    <p class="subtitle">Enter your name</p>

    <input type="text" [(ngModel)]="name" placeholder="Enter name" (keyup.enter)="joinChat()" />

    <button (click)="joinChat()">Join</button>

  </div>

  <!-- ROOM -->
  <div class="login-card" *ngIf="joined && !roomCreated">

    <h3>Room</h3>

    <input type="text" [(ngModel)]="roomId" placeholder="4-digit room" maxlength="4" (input)="onRoomIdInput()" />

    <button (click)="joinRoom()">Join</button>
    <div style="padding: 5px;"></div>
    <button (click)="createRoom()">Create</button>

  </div>

  <!-- CHAT -->
  <div class="chat-container" *ngIf="joined && roomCreated">

    <!-- HEADER -->
    <div class="chat-header">


      <div class="profile">
        <label class="back-btn">
          ↩
          <input hidden (click)="back()" />
        </label>
        <!-- <div class="avatar">
          {{ name.charAt(0).toUpperCase() }}
        </div> -->

        <div class="center-header">
          <div class="username clickable" (click)="scrollToBottom()">{{ roomId }}
          </div>
          <!-- <div class="status">{{status}}</div> -->
        </div>
        <label class="back-btn">
          ❌
          <input hidden (click)="logout()" />
        </label>
      </div>

    </div>
    <!-- MESSAGES -->
    <div class="messages" #scrollMe>

      <div *ngFor="let msg of messages" class="message-wrapper" [class.me-wrapper]="msg.name === name">

        <div class="message" [class.me]="msg.name === name" [class.other]="msg.name !== name">

          <div *ngIf="msg.name !== name" class="sender">
            {{ msg.name }}
          </div>

          <!-- TEXT -->
          <div class="text" *ngIf="msg.message">
            {{ msg.message }}
          </div>

          <!-- IMAGE -->
          <img *ngIf="msg.image && !msg.viewOnce" [src]="msg.image" class="chat-image" />

          <!-- VIEW ONCE -->
          <div *ngIf="msg.image && msg.viewOnce">



            <!-- <img *ngIf="!msg.viewedBy?.includes(name)" [src]="msg.image" class="chat-image"
              (click)="openViewOnce(msg)" /> -->

            <!-- ALWAYS RENDER IMAGE (CLICKABLE LOGIC HANDLED IN TS) -->
            <!-- <img [src]="" class="chat-image" (click)="openViewOnce(msg)"
              *ngIf="!msg.viewedBy?.includes(name) || msg.name === name" /> -->

            <div class="view-once-box" *ngIf="!msg.viewedBy?.includes(name) || msg.name === name"
              (click)="openViewOnce(msg)">
              👁 View Once Photo
            </div>

          </div>
          <div class="viewed-box" *ngIf="!msg.image && !msg.message">
            🔒 Photo expired
          </div>

          <!-- META -->
          <div class="meta">

            <span class="time">
              {{ msg.createdAt | date:'shortTime' }}
            </span>

            <span class="tick" *ngIf="msg.name === name" [class.read]="msg.read">
              ✓✓
            </span>

          </div>

        </div>

      </div>

    </div>

    <!-- IMAGE PREVIEW -->
    <div class="image-preview-box" *ngIf="previewImage">

      <img [src]="previewImage" class="preview-image" />

      <button class="remove-preview" (click)="removeSelectedImage()">
        ✕
      </button>

      <div class="preview-badge">
        👁 View Once
      </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">

      <input type="text" [(ngModel)]="message" placeholder="Type message..." (keyup.enter)="sendMessage()" />

      <label class="image-btn">
        🖼️
        <input type="file" hidden accept="image/*" (change)="onImageSelected($event)" />
      </label>

      <button (click)="sendMessage()">➤</button>

    </div>

    <!-- <button (click)="logout()">Logout</button> -->

  </div>

</div>

<!-- IMAGE MODAL -->
<div class="img-modal" *ngIf="showImageDialog">

  <div class="img-backdrop" (click)="closeDialog()"></div>

  <div class="img-content">

    <button class="close-btn" (click)="closeDialog()">
      ✕
    </button>

    <img [src]="selectedDialogImage" />

  </div>

</div>
